version: 1

identity:
  display_name: "YOUR_NAME"
  github_login: "YOUR_GITHUB_LOGIN"
  jira_user: "currentUser()"

time:
  timezone: "YOUR_TIMEZONE"
  schedule:
    weekdays: [monday, tuesday, wednesday, thursday, friday]
    local_time: "09:00"
  monday_uses_previous_friday: true

scope:
  github_organization: "YOUR_ORGANIZATION"
  jira_site: "YOUR_JIRA_SITE"
  exclude_personal_topics: true

jira:
  read_only: true
  prefer_active_sprint_parent_issues: true

delivery:
  provider: "YOUR_MESSAGING_PROVIDER"
  destination_type: "channel_or_chat"
  destination_name: "YOUR_DESTINATION"
  content_format: "html"
  scheduled_run_auto_send: false
  manual_run_requires_confirmation: true

output:
  language: "YOUR_LANGUAGE"
  headings: ["yesterday", "today"]
  voice: "first_person_singular"
  max_bullets_per_section: 6
